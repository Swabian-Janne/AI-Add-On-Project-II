<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Beau+Rivage&family=Merriweather:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400;1,700;1,900&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="src/style.css">
    <title>AI Poem Generator</title>
</head>

<body>
    <div class="container">
        <header>
            <h1>AI German Poem Generator</h1>
        </header>
        <main>
            <form>
                <input type="text" class="poem-input"  placeholder="Enter a theme for your German poem..."
                    autofocus required autocomplete="off" />
                <input type="submit" class="submit-btn" />
            </form>
            <div class="poem">
                Was bedächtlich Natur sonst unter viele verteilet,
                <br />
                Gab sie mit reichlicher Hand alles der Einzigen, ihr.
            </div /*poem*/>

        </main>

        <footer> This AI Project was coded with 🍍-Power and is on <a
                href="http://github.com/Swabian-Janne/AI-Add-On-Project-II.git" target="_blank">
                GitHub </a> and <a href="http://to-make-goethe-and-schiller-jeaouls.netlify.app/" target="_blank">
                Netlify </a>
        </footer>

    </div /*container*/>
    <script src="src/index.js"></script>
</body>

</html>
